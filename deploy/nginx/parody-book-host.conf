# /etc/nginx/sites-available/rtcbook.org  (one server block per book site)
# TLS via certbot/ACM; this is the reverse proxy to gunicorn. WhiteNoise serves
# /static/ from the app, so only /media/ is mapped to disk here.
server {
    server_name rtcbook.org www.rtcbook.org;

    client_max_body_size 25m;

    location /media/ {
        alias /var/lib/parody-book-host/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # SECURE_PROXY_SSL_HEADER
    }

    listen 443 ssl;
    # ssl_certificate / ssl_certificate_key managed by certbot or ACM+ALB.
}

server {
    listen 80;
    server_name rtcbook.org www.rtcbook.org;
    return 301 https://$host$request_uri;
}
